# ===========================
# CONFIGURATION EXAMPLE
# ===========================
# {{JOB_NAME}}: gcn-arco
# {{DATA_ROOT}}: /lustrehome/robertobarile/kg-saf/data
# {{DATASET_NAME}}: ARCO_10_ROFF
# {{OUTPUT_ROOT}}: /lustrehome/robertobarile/kg-saf/experiments
# {{PYSTOW_HOME}}: /lustrehome/robertobarile
# {{MODEL}}: CompGCN

apiVersion: batch/v1
kind: Job
metadata:
  name: "{{JOB_NAME}}"
spec:
  ttlSecondsAfterFinished: 172800
  backoffLimit: 0                     
  template:
    spec:
      runtimeClassName: nvidia
      containers:
      - name: train
        image: rbarile17/kg-saf:latest
        env:
          - name: DATA_ROOT
            value: "{{DATA_ROOT}}"
          - name: DATASET_NAME
            value: "{{DATASET_NAME}}"
          - name: OUTPUT_ROOT
            value: "{{OUTPUT_ROOT}}"
          - name: JOB_NAME
            value: "{{JOB_NAME}}"
          - name: PYSTOW_HOME
            value: "{{PYSTOW_HOME}}"
          - name: TORCHINDUCTOR_CACHE_DIR
            value: /tmp/torchinductor
          - name: TORCHDYNAMO_CACHE_DIR
            value: /tmp/torchdynamo
        command: ["sh", "-c"]
        args:
          - >
            cd /app/kg-saf &&
            python -m jdex.train
            --dataset-dir ${DATA_ROOT}/${DATASET_NAME}
            --output-dir ${OUTPUT_ROOT}/${JOB_NAME}
            --model {{MODEL}}
            > ${OUTPUT_ROOT}/${JOB_NAME}.log 2>&1
        resources:
          requests:
            cpu: "8"
            memory: "64Gi"
            nvidia.com/gpu: 1
          limits:
            cpu: "8"
            memory: "64Gi"
            nvidia.com/gpu: 1
        volumeMounts:
        - name: lustre
          mountPath: /lustre
        - name: lustrehome
          mountPath: /lustrehome
      restartPolicy: Never
      volumes:
      - name: lustre
        hostPath:
          path: /lustre
          type: Directory
      - name: lustrehome
        hostPath:
          path: /lustrehome
          type: Directory
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A100-PCIE-40GB